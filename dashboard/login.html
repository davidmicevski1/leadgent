<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeadGent Login</title>
    <style>
      :root {
        --bg: #f4efe4;
        --ink: #112628;
        --muted: #55696b;
        --line: #d5dbd4;
        --teal: #0f8078;
        --panel: #fffdf7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        font-family: "Avenir Next", "Space Grotesk", "Trebuchet MS", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 16%, rgba(247, 198, 141, 0.38), transparent 38%),
          radial-gradient(circle at 88% 6%, rgba(157, 224, 216, 0.5), transparent 34%),
          var(--bg);
      }

      .card {
        width: min(440px, 95vw);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        padding: 1rem;
        box-shadow: 0 18px 48px rgba(17, 38, 40, 0.14);
      }

      .eyebrow {
        margin: 0;
        color: var(--teal);
        text-transform: uppercase;
        letter-spacing: 0.09em;
        font-size: 0.76rem;
        font-weight: 700;
      }

      h1 {
        margin: 0.35rem 0 0.8rem;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 0.8rem;
        color: var(--muted);
      }

      label {
        display: grid;
        gap: 0.35rem;
        margin-bottom: 0.7rem;
        color: var(--muted);
        font-size: 0.88rem;
      }

      input,
      select,
      button {
        font: inherit;
      }

      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.62rem 0.7rem;
        background: #ffffff;
      }

      button {
        width: 100%;
        border: 1px solid var(--teal);
        border-radius: 12px;
        padding: 0.62rem 0.7rem;
        background: linear-gradient(120deg, #0f8078, #116c66);
        color: #f5fffd;
        cursor: pointer;
        font-weight: 600;
      }

      .error {
        margin-top: 0.75rem;
        color: #b94f39;
        min-height: 1.2rem;
      }

      .hint {
        margin-top: 0.9rem;
        font-size: 0.79rem;
      }

      code {
        font-family: "IBM Plex Mono", "Menlo", "Consolas", monospace;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">LeadGent</p>
      <h1>Sign In</h1>
      <p>Login required to access tasks and docs.</p>

      <form id="login-form">
        <label>
          User
          <select id="username" required>
            <option value="David">David</option>
            <option value="Viktorija">Viktorija</option>
          </select>
        </label>

        <label>
          Password
          <input id="password" type="password" autocomplete="current-password" required />
        </label>

        <button type="submit">Sign In</button>
      </form>

      <p id="error" class="error"></p>
      <p class="hint">For hosted usage, set <code>LEADGENT_DAVID_PASSWORD</code> and <code>LEADGENT_VIKTORIJA_PASSWORD</code>.</p>
    </main>

    <script>
      const form = document.getElementById("login-form");
      const errorNode = document.getElementById("error");

      const apiRequest = async (url, options = {}) => {
        const response = await fetch(url, {
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            ...(options.headers || {}),
          },
          ...options,
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || `Request failed: ${response.status}`);
        }

        return payload;
      };

      const checkExistingSession = async () => {
        try {
          await apiRequest("/api/me");
          window.location.href = "/dashboard/";
        } catch (_) {
          // Not logged in; stay on page.
        }
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorNode.textContent = "";

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        try {
          await apiRequest("/api/login", {
            method: "POST",
            body: JSON.stringify({ username, password }),
          });
          window.location.href = "/dashboard/";
        } catch (error) {
          errorNode.textContent = error.message;
        }
      });

      checkExistingSession();
    </script>
  </body>
</html>
